<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JARVIS – Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #00e5ff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .title {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #00e5ff;
      text-shadow: 0 0 20px #00e5ff88;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #ffffff44;
      letter-spacing: 0.2em;
      margin-bottom: 3rem;
    }

    /* Orb */
    .orb-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 2.5rem;
    }

    .orb {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #00e5ff55, #003b4a, #0a0a0f);
      border: 2px solid #00e5ff33;
      box-shadow: 0 0 30px #00e5ff44, inset 0 0 30px #00e5ff11;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      user-select: none;
    }

    .orb.listening {
      animation: pulse 1.2s ease-in-out infinite;
      border-color: #00e5ffaa;
      box-shadow: 0 0 60px #00e5ff88, inset 0 0 30px #00e5ff22;
    }

    .orb.speaking {
      animation: speakPulse 0.6s ease-in-out infinite alternate;
      border-color: #00ff99aa;
      box-shadow: 0 0 60px #00ff9988, inset 0 0 30px #00ff9922;
      background: radial-gradient(circle at 35% 35%, #00ff9933, #003b4a, #0a0a0f);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px #00e5ff88; }
      50% { transform: scale(1.06); box-shadow: 0 0 90px #00e5ffcc; }
    }

    @keyframes speakPulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .status {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: #00e5ffaa;
      margin-bottom: 2rem;
      min-height: 1.4rem;
      text-align: center;
    }

    .btn {
      padding: 0.8rem 2.5rem;
      border: 1.5px solid #00e5ff55;
      background: transparent;
      color: #00e5ff;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #00e5ff11;
      border-color: #00e5ffaa;
      box-shadow: 0 0 20px #00e5ff44;
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn.stop {
      border-color: #ff4d4d55;
      color: #ff4d4d;
    }

    .btn.stop:hover {
      background: #ff4d4d11;
      border-color: #ff4d4daa;
    }

    .api-section {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .api-section input {
      background: #0a0a0f;
      border: 1px solid #00e5ff33;
      color: #00e5ff;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.8rem;
      width: 240px;
      outline: none;
    }

    .api-section input::placeholder { color: #ffffff33; }

    .api-section button {
      background: transparent;
      border: 1px solid #00e5ff44;
      color: #00e5ffaa;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .wave-bars {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 40px;
      margin-bottom: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .wave-bars.active { opacity: 1; }

    .bar {
      width: 4px;
      border-radius: 2px;
      background: #00e5ff;
      animation: none;
      height: 4px;
    }

    .wave-bars.listening .bar {
      animation: wave 1s ease-in-out infinite;
    }

    .wave-bars.speaking .bar {
      background: #00ff99;
      animation: wave 0.5s ease-in-out infinite;
    }

    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.15s; }
    .bar:nth-child(6) { animation-delay: 0.25s; }
    .bar:nth-child(7) { animation-delay: 0.05s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 28px; }
    }
  </style>
</head>
<body>

  <!-- API Key Input (top-right corner) -->
  <div class="api-section">
    <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API Key here" />
    <button onclick="saveKey()">Save</button>
  </div>

  <div class="title">J A R V I S</div>
  <div class="subtitle">PERSONAL VOICE ASSISTANT · NABIULLAH</div>

  <div class="orb-container">
    <div class="orb" id="orb">🎙️</div>
  </div>

  <div class="wave-bars" id="waveBars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="status" id="status">Press START to activate JARVIS</div>

  <div style="display:flex;gap:1rem;">
    <button class="btn" id="startBtn" onclick="startSession()">▶ START</button>
    <button class="btn stop" id="stopBtn" onclick="stopSession()" disabled>■ STOP</button>
  </div>

<script>
  const MODEL = 'gemini-2.5-flash-preview-native-audio-dialog';
  const SYSTEM_INSTRUCTION = `You are JARVIS, a personal AI voice assistant for Nabiullah Ali only. 
  You are calm, highly intelligent, and loyal. You speak in a professional yet warm tone. 
  You only respond to Nabiullah. You are not a generic chatbot — you are his private AI assistant. 
  Keep your responses concise and spoken naturally, since this is a voice-only interface. 
  Do not mention markdown, lists, or formatting. Just speak clearly and helpfully.`;

  let ws = null;
  let mediaStream = null;
  let audioContext = null;
  let processor = null;
  let isRunning = false;
  let outputAudioCtx = null;
  let audioQueue = [];
  let isPlaying = false;

  function saveKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (key) {
      localStorage.setItem('gemini_api_key', key);
      document.getElementById('apiKeyInput').value = '••••••••••••••••••••';
      setStatus('API Key saved ✓');
    }
  }

  function getApiKey() {
    return localStorage.getItem('gemini_api_key') || '';
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function setOrbState(state) {
    const orb = document.getElementById('orb');
    const bars = document.getElementById('waveBars');
    orb.className = 'orb ' + state;
    bars.className = 'wave-bars ' + (state ? 'active ' + state : '');
    if (state === 'listening') orb.textContent = '🎙️';
    else if (state === 'speaking') orb.textContent = '🔊';
    else orb.textContent = '🎙️';
  }

  function float32ToInt16(buffer) {
    const l = buffer.length;
    const result = new Int16Array(l);
    for (let i = 0; i < l; i++) {
      result[i] = Math.max(-1, Math.min(1, buffer[i])) * 0x7fff;
    }
    return result;
  }

  function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }

  async function playAudioChunk(base64Data) {
    if (!outputAudioCtx) {
      outputAudioCtx = new AudioContext({ sampleRate: 24000 });
    }
    const buffer = base64ToArrayBuffer(base64Data);
    const int16 = new Int16Array(buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

    const audioBuffer = outputAudioCtx.createBuffer(1, float32.length, 24000);
    audioBuffer.copyToChannel(float32, 0);

    audioQueue.push(audioBuffer);
    if (!isPlaying) playNext();
  }

  function playNext() {
    if (audioQueue.length === 0) {
      isPlaying = false;
      setOrbState('listening');
      setStatus('Listening... speak now');
      return;
    }
    isPlaying = true;
    const buffer = audioQueue.shift();
    const source = outputAudioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(outputAudioCtx.destination);
    source.onended = playNext;
    source.start();
  }

  async function startSession() {
    const apiKey = getApiKey();
    if (!apiKey) {
      setStatus('⚠️ Please enter your Gemini API key first (top-right)');
      return;
    }

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      setStatus('❌ Microphone access denied');
      return;
    }

    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    isRunning = true;

    const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${apiKey}`;
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus('Connecting to JARVIS...');
      // Send setup message
      const setup = {
        setup: {
          model: `models/${MODEL}`,
          generation_config: {
            response_modalities: ['AUDIO'],
            speech_config: {
              voice_config: {
                prebuilt_voice_config: { voice_name: 'Charon' }
              }
            }
          },
          system_instruction: {
            parts: [{ text: SYSTEM_INSTRUCTION }]
          }
        }
      };
      ws.send(JSON.stringify(setup));
    };

    ws.onmessage = async (event) => {
      let data;
      if (event.data instanceof Blob) {
        data = JSON.parse(await event.data.text());
      } else {
        data = JSON.parse(event.data);
      }

      if (data.setupComplete) {
        setStatus('Listening... speak now');
        setOrbState('listening');
        startMicrophone();
        return;
      }

      if (data.serverContent) {
        const content = data.serverContent;
        if (content.modelTurn && content.modelTurn.parts) {
          setOrbState('speaking');
          setStatus('JARVIS is speaking...');
          for (const part of content.modelTurn.parts) {
            if (part.inlineData && part.inlineData.data) {
              await playAudioChunk(part.inlineData.data);
            }
          }
        }
        if (content.turnComplete) {
          if (audioQueue.length === 0 && !isPlaying) {
            setOrbState('listening');
            setStatus('Listening... speak now');
          }
        }
      }
    };

    ws.onerror = (e) => { setStatus('❌ Connection error. Check API key.'); stopSession(); };
    ws.onclose = () => { if (isRunning) setStatus('Connection closed.'); };
  }

  function startMicrophone() {
    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(mediaStream);
    processor = audioContext.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const input = e.inputBuffer.getChannelData(0);
      const int16 = float32ToInt16(input);
      const base64 = btoa(String.fromCharCode(...new Uint8Array(int16.buffer)));
      const msg = {
        realtime_input: {
          media_chunks: [{
            data: base64,
            mime_type: 'audio/pcm;rate=16000'
          }]
        }
      };
      ws.send(JSON.stringify(msg));
    };

    source.connect(processor);
    processor.connect(audioContext.destination);
  }

  function stopSession() {
    isRunning = false;
    if (ws) { ws.close(); ws = null; }
    if (processor) { processor.disconnect(); processor = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    audioQueue = [];
    isPlaying = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    setOrbState('');
    setStatus('Press START to activate JARVIS');
  }

  // Load saved key on startup
  window.onload = () => {
    if (localStorage.getItem('gemini_api_key')) {
      document.getElementById('apiKeyInput').value = '••••••••••••••••••••';
      setStatus('API Key loaded. Press START.');
    }
  };
</script>
</body>
</html>
